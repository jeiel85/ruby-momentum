databases:
  - name: ruby-momentum-db
    plan: free
    databaseName: ruby_momentum_production
    user: ruby_momentum

services:
  - type: web
    name: ruby-momentum
    runtime: ruby
    plan: free
    region: singapore
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ruby-momentum-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RAILS_MAX_THREADS
        value: "5"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ACTIVE_STORAGE_SERVICE
        value: local
      # 아래 키들은 Render 대시보드에서 직접 입력 (sync: false → Blueprint 동기화 제외)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PREMIUM_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_PREMIUM_YEARLY_PRICE_ID
        sync: false
