test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Amazon S3 configuration
# Set credentials via: bin/rails credentials:edit
amazon:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
  region: <%= Rails.application.credentials.dig(:aws, :region) || "us-east-1" %>
  bucket: <%= Rails.application.credentials.dig(:aws, :bucket) || "ruby-momentum-#{Rails.env}" %>
  http_open_timeout: 5
  http_read_timeout: 5
  retry_limit: 3

# Cloudflare R2 (S3-compatible, no egress fees)
r2:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:r2, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:r2, :secret_access_key) %>
  endpoint: <%= Rails.application.credentials.dig(:r2, :endpoint) %>
  region: auto
  bucket: <%= Rails.application.credentials.dig(:r2, :bucket) || "ruby-momentum-#{Rails.env}" %>
  http_open_timeout: 5
  http_read_timeout: 5
  force_path_style: true

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
